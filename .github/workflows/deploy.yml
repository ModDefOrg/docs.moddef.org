name: deploy

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger: the build pulls the spec, CLI, stdlib, and SDK docs from
  # sibling repos, so redeploy from here when one of those updates.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Fork PRs don't run CI: PRs from outside the org must be pulled into a
    # repo branch by a maintainer first (supply-chain guard).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: docs.moddef.org
      # Sibling checkouts: the spec, CLI, and stdlib come from moddef; each
      # SDK's API docs are built from its own repo (coupled build).
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/moddef, path: moddef}
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/moddef-ts, path: moddef-ts}
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/moddef-rs, path: moddef-rs}
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/moddef-py, path: moddef-py}
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/moddef-c, path: moddef-c}
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/moddef-cpp, path: moddef-cpp, submodules: recursive}
      - uses: actions/checkout@v4
        with: {repository: ModDefOrg/devices, path: devices}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs.moddef.org/package-lock.json
      - uses: actions/setup-go@v5
        with: {go-version: '1.25'}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Generate moddef Go stubs (go/genpb is a build artifact)
        working-directory: moddef
        run: buf generate
      - name: Install doc tools
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen graphviz
          python -m pip install --quiet sphinx furo
          pip install -e moddef-py

      - name: Install site deps
        working-directory: docs.moddef.org
        run: npm ci

      - name: Build SDK API docs (rustdoc / typedoc / sphinx / doxygen / go)
        working-directory: docs.moddef.org
        run: bash scripts/build-sdk-docs.sh

      - name: Build site (syncs spec, measurands, CLI from ../moddef)
        working-directory: docs.moddef.org
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs.moddef.org/build

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
